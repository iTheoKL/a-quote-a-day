<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>A Quote A Day | English Dept Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="masthead" id="masthead">
        <div class="masthead-meta">
            <span id="mastDateline">LOADING...</span>
            <span class="masthead-edition">Digital Archive</span>
            <span id="mastCount">0 Quotes</span>
        </div>
        <div class="masthead-title">A Quote A Day</div>
        <nav class="nav-bar">
            <button class="quick-tab active" data-tab="all">✦ All</button>
            <button class="quick-tab" data-tab="authors">Authors</button>
            <button class="quick-tab" data-tab="contributors">Contributors</button>
            <button class="quick-tab" data-tab="departments">Depts</button>
        </nav>
    </header>

    <main class="newspaper-body" id="mainContent">
        <div id="loader" style="text-align:center; padding:100px;">
            <div style="font-size:40px;">❦</div>
            <p style="font-family:monospace; font-size:12px; margin-top:20px; color:#b0a99f; letter-spacing:2px;">TYPESETTING WISDOM...</p>
        </div>
    </main>

    <div class="deck-overlay" id="deckOverlay">
        <div class="deck-topbar">
            <button id="deckClose">✕</button>
            <div id="deckCounter">01 / 00</div>
            <div style="width:32px;"></div>
        </div>
        <div class="deck-track-wrap">
            <div class="deck-track" id="deckTrack"></div>
        </div>
    </div>

    <div id="dirBackdrop" class="dir-backdrop"></div>
    <aside class="dir-panel" id="dirPanel">
        <div class="dir-header">
            <h2 id="dirTitle">Directory</h2>
            <button id="dirClose">✕</button>
        </div>
        <div id="dirList" class="dir-list"></div>
    </aside>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
